# Repository settings managed by the Probot "Settings" app.
# Mirrors the aura repo's setup, adapted for a solo-maintained portfolio:
# rebase-only merges, issues/wiki/projects disabled, linear history on main.
# (No required PR reviews, since this repo is pushed only by the owner.)

repository:
  allow_merge_commit: false
  allow_squash_merge: false
  allow_rebase_merge: true
  delete_branch_on_merge: true

  has_issues: false
  has_wiki: false
  has_projects: false

branches:
  - name: main
    protection:
      required_status_checks:
        strict: true
        contexts:
          - "Quality & Security / Code Quality – Format, Lint, Types & Build"
          - "Quality & Security / Dependency Security Scan (npm audit)"
          - "CodeQL Analysis / CodeQL SAST Scan"

      required_pull_request_reviews: null

      required_conversation_resolution: true

      enforce_admins: false

      allow_force_pushes: false
      allow_deletions: false

      required_linear_history: true

labels:
  - name: "security"
    color: "d73a4a"
    description: "Security-related fixes, CVEs, SAST, supply chain"

  - name: "ci"
    color: "0e8a16"
    description: "CI/CD workflow updates"

  - name: "dependencies"
    color: "1d76db"
    description: "Dependency updates and maintenance"
